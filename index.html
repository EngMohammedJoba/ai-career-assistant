<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Career Assistant</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">

  <style>
    /* ===== LANDING OVERLAY ===== */
    .landing {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #111827, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: 0.5s;
    }

    .landing.hide {
      opacity: 0;
      pointer-events: none;
    }

    .hero {
      text-align: center;
      max-width: 500px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin-bottom: 20px;
      color: var(--text-muted);
    }

    .features {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .feature {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- 🔥 LANDING -->
  <div class="landing" id="landing">
    <div class="card hero">
      <h1>AI Career Assistant 🚀</h1>

      <p>
        Discover your ideal career path using AI.  
        Analyze your CV, explore roles, and improve your skills.
      </p>

      <button class="btn" onclick="start()">Get Started</button>

      <div class="features">
        <div class="feature">📄 CV Analysis</div>
        <div class="feature">🎯 Role Matching</div>
        <div class="feature">🧠 Skill Quiz</div>
        <div class="feature">📊 Gap Detection</div>
      </div>
    </div>
  </div>

  <!-- 🔽 ORIGINAL PAGE (UPLOAD) -->
  <div class="container fade-in">
    <div class="card">
      <h1>Upload Your CV</h1>
      <p>Start your AI career journey</p>

      <div class="upload-box" id="uploadBox">
        <p id="fileText">Click or drag your CV here</p>
        <input type="file" id="fileInput" hidden>
      </div>

      <button class="btn" id="uploadBtn">Analyze CV</button>

      <div class="loader" id="loader"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">Error</div>

  <script type="module" src="js/main.js"></script>

  <!-- 🔥 LANDING SCRIPT -->
  <script>
    function start() {
      document.getElementById("landing").classList.add("hide");
    }
  </script>

</body>
</html>
