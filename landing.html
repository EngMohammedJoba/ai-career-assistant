<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Career Assistant</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">

  <style>
    .hero {
      text-align: center;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .features {
      margin-top: 30px;
      display: grid;
      gap: 15px;
    }

    .feature {
      padding: 15px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

  <div class="container fade-in">
    <div class="card hero">

      <h1>AI Career Assistant 🚀</h1>
      <p>Analyze your CV, discover best roles, test your skills, and improve.</p>

      <button class="btn" onclick="start()">Get Started</button>

      <div class="features">
        <div class="feature">📄 Smart CV Analysis</div>
        <div class="feature">🎯 Role Recommendation</div>
        <div class="feature">🧠 AI Quiz Generation</div>
        <div class="feature">📊 Skill Gap Detection</div>
      </div>

    </div>
  </div>

  <script>
    function start() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
